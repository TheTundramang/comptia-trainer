<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none';">
    <title>CompTIA Trainer</title>
    <script src="/theme-init.js"></script>
    <style>
      @font-face { font-family: 'Poppins'; font-style: normal; font-weight: 400; font-display: swap; src: url('/fonts/poppins-400.woff2') format('woff2'); }
      @font-face { font-family: 'Poppins'; font-style: normal; font-weight: 500; font-display: swap; src: url('/fonts/poppins-500.woff2') format('woff2'); }
      @font-face { font-family: 'Poppins'; font-style: normal; font-weight: 600; font-display: swap; src: url('/fonts/poppins-600.woff2') format('woff2'); }
      @font-face { font-family: 'Poppins'; font-style: normal; font-weight: 700; font-display: swap; src: url('/fonts/poppins-700.woff2') format('woff2'); }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --c-bg: #0d0f1e;
        --c-surface: #161929;
        --c-border: #272f52;
        --c-muted: #3a4570;
        --c-text: #e4eaff;
        --c-dim: #7080b0;
        --c-shadow: 0 2px 12px rgba(0,0,0,0.35);
      }

      :root[data-theme="light"] {
        --c-bg: #f0f4ff;
        --c-surface: #ffffff;
        --c-border: #a8b8d8;
        --c-muted: #c5cde8;
        --c-text: #1a1d35;
        --c-dim: #6575a8;
        --c-shadow: 0 2px 16px rgba(30,40,100,0.08);
      }

      html, body {
        font-family: 'Poppins', system-ui, -apple-system, sans-serif;
        background: var(--c-bg);
        color: var(--c-text);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }

      button { font-family: inherit; }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--c-bg); }
      ::-webkit-scrollbar-thumb { background: var(--c-border); border-radius: 3px; }

      [data-theme="light"] .scan-overlay { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
