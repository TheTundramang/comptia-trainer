name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Start preview server
        run: npx vite preview --port 5174 &
        env:
          NODE_ENV: production

      - name: Wait for server
        run: npx wait-on http://localhost:5174 --timeout 15000

      - name: Run smoke tests
        run: node e2e/smoke.mjs
        env:
          TEST_URL: http://localhost:5174
